name: Build and release APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # Default is only tools + platform-tools — Gradle needs API 34 + build-tools.
      - uses: android-actions/setup-android@v4
        with:
          packages: tools platform-tools platforms;android-34 build-tools;34.0.0

      - name: sdk.dir for Gradle
        run: |
          SDK="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}"
          if [ -z "$SDK" ] || [ ! -d "$SDK" ]; then
            echo "ANDROID_SDK_ROOT / ANDROID_HOME not set or missing"
            exit 1
          fi
          echo "sdk.dir=$SDK" > local.properties
          cat local.properties

      - name: Keystore for release signing (sideload / CI)
        run: |
          mkdir -p ~/.android
          keytool -genkey -v -keystore ~/.android/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"

      - name: Gradle wrapper permissions
        run: chmod +x gradlew

      - name: Build release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: List release outputs
        run: ls -la app/build/outputs/apk/release/

      - name: Rename APK for release asset
        if: github.ref_type == 'tag'
        run: |
          test -f app/build/outputs/apk/release/app-release.apk
          cp app/build/outputs/apk/release/app-release.apk "DLPulse-${{ github.ref_name }}.apk"
          ls -la "DLPulse-${{ github.ref_name }}.apk"

      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: DLPulse-${{ github.ref_name }}.apk
          generate_release_notes: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK artifact (manual / branch run)
        if: ${{ github.ref_type != 'tag' }}
        uses: actions/upload-artifact@v4
        with:
          name: DLPulse-release-apk
          path: app/build/outputs/apk/release/app-release.apk
